services:
  db:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env.postgres
    environment:
      POSTGRES_DB: plex_production
      POSTGRES_USER: plex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plex -d plex_production"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/10-init-multiple-dbs.sh:ro

  web:
    build: .
    image: plex-admin:production
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      PLEX_DATABASE_USERNAME: plex
      SOLID_QUEUE_IN_PUMA: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"Host: $${PLEX_HOST:-plexadmin.example.com}\" http://127.0.0.1/up >/dev/null"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 12
    ports:
      - "${PLEX_ADMIN_BIND:-0.0.0.0}:${PLEX_ADMIN_PORT:-3010}:80"
    volumes:
      - app_storage:/rails/storage

  daily_refresh:
    image: plex-admin:production
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      PLEX_DATABASE_USERNAME: plex
    depends_on:
      db:
        condition: service_healthy
    command: ["./docker/daily-refresh"]
    volumes:
      - app_storage:/rails/storage

volumes:
  postgres_data:
  app_storage:
